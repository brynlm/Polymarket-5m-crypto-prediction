services:
  - type: web
    name: rl-trading-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false  # Set this in Render dashboard to your Vercel URL, e.g. https://your-app.vercel.app
