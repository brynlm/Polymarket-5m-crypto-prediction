services:
  - type: web
    name: polymarket-5m-btc-prediction
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS=https://your-app.vercel.app
        sync: false  # Set this in Render dashboard to your Vercel URL, e.g. https://your-app.vercel.app
